included:
  - OnlyCue
  - OnlyCueTests
  - OnlyCueUITests

excluded:
  - .build
  - DerivedData
  - Pods
  - vendor

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool

analyzer_rules:
  - unused_import

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - on

type_name:
  min_length:
    warning: 3

reporter: "xcode"
