name: OnlyCue
options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_ENABLE_MODULES: YES
  configs:
    Debug:
      SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    Release:
      SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
      GCC_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  OnlyCue:
    type: application
    platform: macOS
    sources:
      - path: OnlyCue
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chienchuanw.OnlyCue
        PRODUCT_NAME: OnlyCue
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OnlyCue/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed (brew install swiftlint)"
          fi
        basedOnDependencyAnalysis: false

  OnlyCueTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OnlyCueTests
    dependencies:
      - target: OnlyCue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chienchuanw.OnlyCueTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OnlyCue.app/Contents/MacOS/OnlyCue"
        GENERATE_INFOPLIST_FILE: YES

  OnlyCueUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - OnlyCueUITests
    dependencies:
      - target: OnlyCue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chienchuanw.OnlyCueUITests
        TEST_TARGET_NAME: OnlyCue
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OnlyCue:
    build:
      targets:
        OnlyCue: all
        OnlyCueTests: [test]
        OnlyCueUITests: [test]
    test:
      targets:
        - OnlyCueTests
        - OnlyCueUITests
    run:
      config: Debug
    archive:
      config: Release
